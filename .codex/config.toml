[mcp_servers.gongfeng]
command = "npx"
args = ["-y", "@tencent/tgit-mcp-server@latest"]
env_vars = ["GONGFENG_ACCESS_TOKEN"]
startup_timeout_sec = 20
tool_timeout_sec = 60
enabled = true
required = false

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--headless", "--isolated"]
startup_timeout_sec = 30
tool_timeout_sec = 90
enabled = true
required = false
